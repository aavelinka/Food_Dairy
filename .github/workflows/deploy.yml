name: Deploy

on:
  workflow_run:
    workflows: ["Build and SonarCloud"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to PaaS and verify health
    runs-on: ubuntu-latest
    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
      APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Trigger backend deploy
        if: ${{ env.RENDER_BACKEND_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"

      - name: Trigger frontend deploy
        if: ${{ env.RENDER_FRONTEND_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL"

      - name: Wait for backend healthcheck
        if: ${{ env.APP_HEALTHCHECK_URL != '' }}
        run: |
          for attempt in $(seq 1 30); do
            status_code=$(curl -s -o /tmp/health.txt -w "%{http_code}" "${APP_HEALTHCHECK_URL}")
            if [ "${status_code}" = "200" ]; then
              echo "Healthcheck passed"
              cat /tmp/health.txt
              exit 0
            fi

            echo "Attempt ${attempt}/30: healthcheck returned ${status_code}"
            sleep 10
          done

          echo "Healthcheck did not become healthy in time"
          cat /tmp/health.txt || true
          exit 1
