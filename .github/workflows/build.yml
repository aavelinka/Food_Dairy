name: CI/CD

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build-and-test:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Build and test backend
        run: ./mvnw -B clean verify

      - name: Build backend Docker image
        run: docker build -t food-diary-backend .

      - name: SonarCloud analyze
        if: ${{ env.SONAR_TOKEN != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.qualitygate.wait=true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t food-diary-frontend .

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    needs:
      - backend-build-and-test
      - frontend-build
    timeout-minutes: 20
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_NAME: ${{ vars.RAILWAY_ENVIRONMENT_NAME != '' && vars.RAILWAY_ENVIRONMENT_NAME || 'production' }}
      RAILWAY_BACKEND_SERVICE: ${{ vars.RAILWAY_BACKEND_SERVICE != '' && vars.RAILWAY_BACKEND_SERVICE || 'Food_Dairy' }}
      RAILWAY_FRONTEND_SERVICE: ${{ vars.RAILWAY_FRONTEND_SERVICE != '' && vars.RAILWAY_FRONTEND_SERVICE || 'frontend' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway configuration
        run: |
          if [ -z "${RAILWAY_TOKEN}" ] && [ -z "${RAILWAY_API_TOKEN}" ]; then
            echo "Missing GitHub secret: RAILWAY_TOKEN or RAILWAY_API_TOKEN" >&2
            exit 1
          fi

          if [ -z "${RAILWAY_PROJECT_ID}" ]; then
            echo "Missing GitHub variable: RAILWAY_PROJECT_ID" >&2
            exit 1
          fi

          echo "Railway project: ${RAILWAY_PROJECT_ID}"
          echo "Railway environment: ${RAILWAY_ENVIRONMENT_NAME}"
          echo "Railway backend service: ${RAILWAY_BACKEND_SERVICE}"
          echo "Railway frontend service: ${RAILWAY_FRONTEND_SERVICE}"

      - name: Show Railway CLI version
        run: railway --version

      - name: Deploy backend service
        run: >
          railway up
          --project "${RAILWAY_PROJECT_ID}"
          --environment "${RAILWAY_ENVIRONMENT_NAME}"
          --service "${RAILWAY_BACKEND_SERVICE}"
          --verbose
          --detach

      - name: Deploy frontend service
        working-directory: frontend
        run: >
          railway up
          .
          --project "${RAILWAY_PROJECT_ID}"
          --environment "${RAILWAY_ENVIRONMENT_NAME}"
          --service "${RAILWAY_FRONTEND_SERVICE}"
          --path-as-root
          --verbose
          --detach

  post-deploy-healthcheck:
    name: Post-deploy Healthcheck
    runs-on: ubuntu-latest
    needs:
      - deploy-railway
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    env:
      BACKEND_HEALTHCHECK_URL: ${{ vars.BACKEND_HEALTHCHECK_URL != '' && vars.BACKEND_HEALTHCHECK_URL || secrets.APP_HEALTHCHECK_URL }}
      FRONTEND_HEALTHCHECK_URL: ${{ vars.FRONTEND_HEALTHCHECK_URL }}
    steps:
      - name: Validate healthcheck configuration
        run: |
          if [ -z "${BACKEND_HEALTHCHECK_URL}" ]; then
            echo "Missing GitHub variable: BACKEND_HEALTHCHECK_URL" >&2
            exit 1
          fi

          if ! echo "${BACKEND_HEALTHCHECK_URL}" | grep -Eq '^https?://'; then
            echo "BACKEND_HEALTHCHECK_URL must start with http:// or https://" >&2
            exit 1
          fi

          if echo "${BACKEND_HEALTHCHECK_URL}" | grep -Eq '[<> ]'; then
            echo "BACKEND_HEALTHCHECK_URL contains placeholder/special characters. Set a real URL." >&2
            exit 1
          fi

      - name: Wait for backend healthcheck
        run: |
          BACKEND_HEALTH_URL="${BACKEND_HEALTHCHECK_URL%/}"
          if [[ "${BACKEND_HEALTH_URL}" != */actuator/health ]]; then
            BACKEND_HEALTH_URL="${BACKEND_HEALTH_URL}/actuator/health"
          fi

          echo "Backend healthcheck URL: ${BACKEND_HEALTH_URL}"
          : > /tmp/backend-health.txt

          for attempt in $(seq 1 60); do
            status_code=$(curl -sS -L --connect-timeout 5 --max-time 20 -o /tmp/backend-health.txt -w "%{http_code}" "${BACKEND_HEALTH_URL}" || true)
            if [ "${status_code}" = "200" ]; then
              echo "Backend healthcheck passed"
              cat /tmp/backend-health.txt || true
              exit 0
            fi

            echo "Backend attempt ${attempt}/60: ${status_code:-no response}"
            sleep 10
          done

          echo "Backend healthcheck did not become healthy in time" >&2
          cat /tmp/backend-health.txt || true
          exit 1

      - name: Wait for frontend healthcheck
        if: ${{ env.FRONTEND_HEALTHCHECK_URL != '' }}
        run: |
          : > /tmp/frontend-health.txt

          for attempt in $(seq 1 60); do
            status_code=$(curl -sS -L --connect-timeout 5 --max-time 20 -o /tmp/frontend-health.txt -w "%{http_code}" "${FRONTEND_HEALTHCHECK_URL}" || true)
            if [ "${status_code}" = "200" ]; then
              echo "Frontend healthcheck passed"
              cat /tmp/frontend-health.txt || true
              exit 0
            fi

            echo "Frontend attempt ${attempt}/60: ${status_code:-no response}"
            sleep 10
          done

          echo "Frontend healthcheck did not become healthy in time" >&2
          cat /tmp/frontend-health.txt || true
          exit 1
